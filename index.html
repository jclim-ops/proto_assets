<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#07071a;display:flex;justify-content:center;align-items:center;font-family:sans-serif;overflow:hidden}
.scene{display:none;flex-direction:column;align-items:center;width:min(100vw,calc(100vh * 9 / 16));height:min(100vh,calc(100vw * 16 / 9));overflow:hidden;position:relative;flex-shrink:0}
.scene.active{display:flex}
#scene-start{justify-content:center;overflow:hidden}
#sc{position:absolute;top:0;left:0;width:100%;height:100%}
.start-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:0 24px}
.logo-title{font-size:42px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,#FFD700,#FF9900,#FF44AA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:6px}
.logo-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:3px;margin-bottom:36px}
.start-btn{padding:16px 60px;border-radius:50px;border:none;background:linear-gradient(135deg,#FF9900,#FF6644);color:#fff;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:1px}
.start-btn:active{transform:scale(.97)}
.start-hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:14px;letter-spacing:2px}
#scene-lobby{background:#07071a;overflow-y:auto}
.lobby-header{width:100%;padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid rgba(255,255,255,.08);flex-shrink:0}
.lobby-logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,#FFD700,#FF9900);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.coin-chip{display:flex;align-items:center;gap:6px;background:rgba(255,200,0,.1);border:0.5px solid rgba(255,200,0,.3);border-radius:20px;padding:5px 12px}
.coin-dot{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FF9900)}
.coin-chip span{font-size:13px;font-weight:500;color:#FFD700}
.lby-profile{width:100%;padding:14px 20px;display:flex;align-items:center;gap:14px;border-bottom:0.5px solid rgba(255,255,255,.06);flex-shrink:0}
.avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#8844FF,#FF44AA);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pname{font-size:15px;font-weight:500;color:#fff}
.plevel{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
.lvbar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:6px}
.lvfill{height:100%;width:62%;background:linear-gradient(90deg,#8844FF,#FF44AA);border-radius:2px}
.sec-title{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1.5px;padding:14px 20px 8px;flex-shrink:0}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px;width:100%;flex-shrink:0}
.sc2{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px}
.sc2 .sl{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:4px}
.sc2 .sv{font-size:20px;font-weight:500;color:#fff}
.sc2 .sv.gld{color:#FFD700}
.sc2 .sv.pur{color:#CC44FF}
.menu-list{width:100%;padding:0 20px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.mi{display:flex;align-items:center;gap:14px;padding:13px 15px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);border-radius:14px;cursor:pointer}
.mi:active{background:rgba(255,255,255,.08)}
.mi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mi-icon.or{background:rgba(255,150,0,.15)}
.mi-icon.pu{background:rgba(170,68,255,.15)}
.mi-icon.bl{background:rgba(68,170,255,.15)}
.mi-icon.gr{background:rgba(68,255,170,.15)}
.mi-txt{flex:1}
.mi-name{font-size:14px;font-weight:500;color:#fff}
.mi-desc{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.mi-arr{color:rgba(255,255,255,.2);font-size:16px}
.mi-badge{font-size:10px;background:rgba(255,100,68,.8);color:#fff;padding:2px 7px;border-radius:10px}
.play-wrap{width:100%;padding:14px 20px 24px;flex-shrink:0}
.play-btn{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,#FF9900,#FF6644);color:#fff;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:1px}
.play-btn:active{transform:scale(.98)}
#scene-game{background:#07071a;overflow:hidden;justify-content:flex-start}
#shell{flex:1;min-height:0;position:relative;width:100%;overflow:hidden}
#shell canvas{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}
#bottom-ui{width:100%;flex-shrink:0;display:flex;flex-direction:column;background:#07071a;border-top:0.5px solid rgba(255,255,255,.08)}
#hud{display:flex;justify-content:space-around;align-items:center;padding:6px 0 6px;width:100%}
.hcol{display:flex;flex-direction:column;align-items:center;gap:1px}
.hlbl{font-size:11px;color:rgba(255,255,255,.35)}
.hval{font-size:18px;font-weight:500;color:#fff}
#item-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:4px 10px;width:100%;border-top:0.5px solid rgba(255,255,255,.08)}
#boom-btn{display:flex;align-items:center;gap:8px;padding:8px 18px;border-radius:24px;border:1.5px solid #FF6644;background:rgba(255,100,68,.12);cursor:pointer;user-select:none}
#boom-btn.empty{opacity:.35;pointer-events:none;border-color:rgba(255,255,255,.2)}
#boom-btn .bicon{font-size:20px;line-height:1}
#boom-btn .binfo{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
#boom-btn .bname{font-size:12px;font-weight:500;color:#FF9977}
#boom-btn .bcnt{font-size:11px;color:rgba(255,255,255,.5)}
#bhint{font-size:11px;color:rgba(255,255,255,.3);text-align:center}
#gbtns{display:flex;gap:6px;padding:4px 0 6px;width:100%;justify-content:center}
#gbtns button{padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);font-size:11px;cursor:pointer}
#gbtns button.on{background:rgba(255,255,255,.15);color:#fff}

/* 인트로 씬 */
#scene-intro {
  justify-content: center;
  background: #07071a;
  cursor: pointer;
}
.proto-text {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 8px;
  color: rgba(255,255,255,0);
  transition: color 0.8s ease;
}
#scene-intro.show-text .proto-text {
  color: rgba(255,255,255,0.7);
}
.tap-hint {
  position: absolute;
  bottom: 60px;
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.25);
  animation: blinkHint 1.4s ease-in-out infinite;
}
@keyframes blinkHint {
  0%,100%{opacity:0.25} 50%{opacity:0.7}
}
#scene-intro.fade-out {
  animation: fadeOut 0.4s forwards;
}
@keyframes fadeOut {
  to { opacity: 0; }
}
</style>
</head>
<body>
<!-- 로고 사운드 -->
<audio id="logo-snd" src="https://raw.githubusercontent.com/jclim-ops/proto_assets/main/LogoSound.mp3" preload="auto"></audio>
<!-- 로비 BGM -->
<audio id="lobby-bgm" loop preload="auto"
  src="https://raw.githubusercontent.com/jclim-ops/proto_assets/main/Lobby2.mp3">
</audio>
<!-- 인게임 BGM -->
<audio id="ingame-bgm" loop preload="auto"
  src="https://raw.githubusercontent.com/jclim-ops/proto_assets/main/Ingame.mp3">
</audio>
<!-- 타이틀 BGM -->
<audio id="title-bgm" loop preload="auto"
  src="https://raw.githubusercontent.com/jclim-ops/proto_assets/main/Title.mp3">
</audio>
<!-- 레벨 클리어 -->
<audio id="levelclear-snd" preload="auto"
  src="https://raw.githubusercontent.com/jclim-ops/proto_assets/main/LevelClear.mp3">
</audio>
<!-- 인트로 씬 -->
<div class="scene active" id="scene-intro" onclick="startIntro()">
  <div class="proto-text" id="proto-text">PROTOTYPE</div>
  <div class="tap-hint" id="tap-hint">TAP TO START</div>
</div>
<!-- 스타트 씬 -->
<div class="scene" id="scene-start">
  <canvas id="sc"></canvas>
  <div class="start-content">
    <div class="logo-title">COIN BALL</div>
    <div class="logo-sub">BOUNCE &amp; WIN</div>
    <button class="start-btn" onclick="goLobby()">START</button>
    <div class="start-hint">TAP TO BEGIN</div>
  </div>
</div>
<!-- 로비 씬 -->
<div class="scene" id="scene-lobby">
  <div class="lobby-header">
    <div class="lobby-logo">COIN BALL</div>
    <div class="coin-chip"><div class="coin-dot"></div><span id="lby-coins">500</span></div>
  </div>
  <div class="lby-profile">
    <div class="avatar">🎮</div>
    <div style="flex:1">
      <div class="pname">Player 1</div>
      <div class="plevel">Lv.12 · Bouncer</div>
      <div class="lvbar"><div class="lvfill"></div></div>
    </div>
  </div>
  <div class="sec-title">STATS</div>
  <div class="stats-grid">
    <div class="sc2"><div class="sl">최고 기록</div><div class="sv gld" id="st-best">0</div></div>
    <div class="sc2"><div class="sl">총 플레이</div><div class="sv" id="st-plays">0</div></div>
    <div class="sc2"><div class="sl">최다 바운스</div><div class="sv pur" id="st-bounce">0</div></div>
    <div class="sc2"><div class="sl">잭팟 횟수</div><div class="sv gld" id="st-jackpot">0</div></div>
  </div>
  <div class="sec-title">MENU</div>
  <div class="menu-list">
    <div class="mi"><div class="mi-icon or">🏆</div><div class="mi-txt"><div class="mi-name">랭킹</div><div class="mi-desc">전 세계 플레이어와 경쟁</div></div><div class="mi-arr">›</div></div>
    <div class="mi"><div class="mi-icon pu">🎁</div><div class="mi-txt"><div class="mi-name">일일 보상</div><div class="mi-desc">매일 코인을 무료로 받아요</div></div><div class="mi-badge">NEW</div></div>
    <div class="mi"><div class="mi-icon bl">🛒</div><div class="mi-txt"><div class="mi-name">상점</div><div class="mi-desc">아이템 &amp; 볼 스킨 구매</div></div><div class="mi-arr">›</div></div>
    <div class="mi"><div class="mi-icon gr">⚙️</div><div class="mi-txt"><div class="mi-name">설정</div><div class="mi-desc">사운드 · 알림 · 계정</div></div><div class="mi-arr">›</div></div>
  </div>
  <div class="play-wrap"><button class="play-btn" onclick="goGame()">▶  PLAY</button></div>
</div>
<!-- 인게임 씬 -->
<div class="scene" id="scene-game">
  <div id="shell">
    <canvas id="cv"></canvas>
  </div>
  <div id="bottom-ui">
    <div id="hud">
      <div class="hcol"><div class="hlbl">보유 코인</div><div class="hval" id="v-coin">500</div></div>
      <div class="hcol"><div class="hlbl">볼 코인</div><div class="hval" id="v-ball">—</div></div>
      <div class="hcol"><div class="hlbl">남은 볼</div><div class="hval" id="v-balls">5</div></div>
    </div>
    <div id="item-bar">
      <div id="boom-btn" onclick="useBoom()">
        <div class="bicon">💥</div>
        <div class="binfo"><div class="bname">폭발 UP</div><div class="bcnt" id="boom-cnt">남은 횟수: 3</div></div>
      </div>
      <div id="bhint">볼 비행 중 버튼 클릭 → 즉시 발동</div>
    </div>
    <div id="gbtns">
      <button onclick="goLobby()">← 로비</button>
      <button class="on" id="btn-normal" onclick="setSpd('normal')">보통</button>
      <button id="btn-fast" onclick="setSpd('fast')">빠르게</button>
      <button onclick="restart()">다시 시작</button>
    </div>
  </div>
</div>
<script>
var stats={best:0,plays:0,bounce:0,jackpot:0};
var gameInited=false;
var coins=500,balls=5,drag=null,boomCnt=3;
var ballList=[],suckList=[],pendingBalls=[],parts=[],floats=[];
var camY=0,camTargetY=0;
var bounceGauge=0,gaugeFull=false,gaugeTimer=0,feverCount=0,GAUGE_MAX=50;
/* ── 인트로 → 스타트 전환 ── */
var introStarted=false;
function startIntro(){
  if(introStarted)return;
  introStarted=true;
  var intro=document.getElementById('scene-intro');
  var logoSnd=document.getElementById('logo-snd');
  document.getElementById('tap-hint').style.display='none';
  intro.classList.add('show-text');
  logoSnd.play().catch(function(){});
  setTimeout(function(){
    intro.classList.add('fade-out');
    setTimeout(function(){showScene('scene-start');playTitleBgm();},400);
  },3700);
}
/* ── BGM ── */
var lobbyBgm=document.getElementById('lobby-bgm');
lobbyBgm.volume=0.5;
function playLobbyBgm(){lobbyBgm.play().catch(function(){});}
function stopLobbyBgm(){lobbyBgm.pause();lobbyBgm.currentTime=0;}
var ingameBgm=document.getElementById('ingame-bgm');
ingameBgm.volume=0.5;
function playIngameBgm(){ingameBgm.play().catch(function(){});}
function stopIngameBgm(){ingameBgm.pause();ingameBgm.currentTime=0;}
var titleBgm=document.getElementById('title-bgm');
titleBgm.volume=0.5;
function playTitleBgm(){titleBgm.play().catch(function(){});}
function stopTitleBgm(){titleBgm.pause();titleBgm.currentTime=0;}
var levelClearSnd=document.getElementById('levelclear-snd');
levelClearSnd.volume=0.7;
var gameOverPlayed=false;
function playLevelClear(){if(!gameOverPlayed){gameOverPlayed=true;stopIngameBgm();levelClearSnd.play().catch(function(){});}}
/* ── 씬 전환 ── */
function showScene(id){
  document.querySelectorAll('.scene').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}
function goLobby(){
  stopIngameBgm();stopTitleBgm();
  document.getElementById('lby-coins').textContent=coins.toLocaleString();
  document.getElementById('st-best').textContent=stats.best.toLocaleString();
  document.getElementById('st-plays').textContent=stats.plays;
  document.getElementById('st-bounce').textContent=stats.bounce;
  document.getElementById('st-jackpot').textContent=stats.jackpot;
  showScene('scene-lobby');
  playLobbyBgm();
}
function goGame(){
  stopLobbyBgm();
  playIngameBgm();
  showScene('scene-game');
  if(!gameInited){initGame();gameInited=true;}
  else{restart();}
  stats.plays++;
}
function setSpd(s){
  spd=s==='normal'?0.45:1.0;
  document.getElementById('btn-normal').classList.toggle('on',s==='normal');
  document.getElementById('btn-fast').classList.toggle('on',s==='fast');
}
function useBoom(){
  if(boomCnt<=0||ballList.length===0)return;
  boomCnt--;
  for(var i=0;i<ballList.length;i++){
    var b=ballList[i];
    var ang=-Math.PI/2+(Math.random()-.5)*(Math.PI*.4);
    b.vx=Math.cos(ang)*MAX_SPEED;b.vy=Math.sin(ang)*MAX_SPEED;
    addBounce(b,5);
    for(var p=0;p<30;p++){var a=Math.random()*Math.PI*2,sv=3+Math.random()*8;addPart(b.x,b.y,Math.cos(a)*sv,Math.sin(a)*sv-2,4+Math.random()*5,Math.random()<.5?'#FF6644':'#FFD700',50);}
    addFloat('BOOM! +5',b.x,b.y-30,50,'#FF6644',20);
  }
  playSound('boom');updHUD();
}
function restart(){
  coins=500;balls=5;boomCnt=3;bounceGauge=0;gaugeFull=false;gaugeTimer=0;feverCount=0;GAUGE_MAX=50;gameOverPlayed=false;
  levelClearSnd.pause();levelClearSnd.currentTime=0;
  playIngameBgm();
  ballList=[];suckList=[];pendingBalls=[];drag=null;parts=[];floats=[];
  if(typeof WORLD_H!=='undefined'){camY=WORLD_H-H;camTargetY=WORLD_H-H;}
  if(typeof pins!=='undefined')resetPins();
  updHUD();
}
/* ── 스타트 씬 배경 ── */
(function(){
  var sc=document.getElementById('sc');
  var sctx=sc.getContext('2d');
  var sw,sh;
  function resize(){sw=sc.width=sc.offsetWidth||360;sh=sc.height=sc.offsetHeight||700;}
  resize();window.addEventListener('resize',resize);
  var bls=Array.from({length:12},function(_,i){return{x:Math.random()*400,y:Math.random()*600,r:14+Math.random()*18,vx:(Math.random()-.5)*1.2,vy:-(0.5+Math.random()*1.4),col:['#FFD700','#FF9900','#FF44AA','#CC44FF','#44AAFF','#44FFAA'][i%6]};});
  function loopS(){
    if(!document.getElementById('scene-start').classList.contains('active')){requestAnimationFrame(loopS);return;}
    sctx.clearRect(0,0,sw,sh);
    bls.forEach(function(b){
      b.x+=b.vx;b.y+=b.vy;b.vy+=0.012;
      if(b.y>sh+30){b.y=-30;b.x=Math.random()*sw;b.vy=-(0.5+Math.random()*1.4);}
      if(b.x<-30)b.x=sw+30;if(b.x>sw+30)b.x=-30;
      sctx.save();sctx.beginPath();sctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      var g=sctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,b.r*.05,b.x,b.y,b.r);
      g.addColorStop(0,'rgba(255,255,255,.5)');g.addColorStop(.5,b.col+'66');g.addColorStop(1,b.col+'22');
      sctx.fillStyle=g;sctx.fill();sctx.strokeStyle=b.col+'99';sctx.lineWidth=1.5;sctx.stroke();sctx.restore();
    });
    requestAnimationFrame(loopS);
  }
  loopS();
})();
/* ── 사운드 ── */
var AudioCtx=window.AudioContext||window.webkitAudioContext;
var audioCtx=null;
function getACtx(){if(!audioCtx){try{audioCtx=new AudioCtx();}catch(e){}}return audioCtx;}
function playSound(type){
  var ac=getACtx();if(!ac)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  var now=ac.currentTime;
  if(type==='pin'){o.type='sine';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(200,now+0.08);g.gain.setValueAtTime(0.18,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.09);o.start(now);o.stop(now+0.09);}
  else if(type==='wall'){o.type='square';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(150,now+0.06);g.gain.setValueAtTime(0.12,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.07);o.start(now);o.stop(now+0.07);}
  else if(type==='hole'){o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(100,now+0.35);g.gain.setValueAtTime(0.22,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.36);o.start(now);o.stop(now+0.36);}
  else if(type==='jackpot'){var freqs=[523,659,784,1047];freqs.forEach(function(f,i){var o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);var t=now+i*0.1;o2.type='sine';o2.frequency.setValueAtTime(f,t);g2.gain.setValueAtTime(0.22,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);o2.start(t);o2.stop(t+0.4);});}
  else if(type==='fever'){var feverF=[300,400,500,650,800];feverF.forEach(function(f,i){var o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);var t=now+i*0.07;o2.type='sawtooth';o2.frequency.setValueAtTime(f,t);g2.gain.setValueAtTime(0.15,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.25);o2.start(t);o2.stop(t+0.25);});}
  else if(type==='boom'){var buf=ac.createBuffer(1,ac.sampleRate*0.25,ac.sampleRate);var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);var src=ac.createBufferSource(),g2=ac.createGain();src.buffer=buf;src.connect(g2);g2.connect(ac.destination);g2.gain.setValueAtTime(0.35,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.25);src.start(now);}
  else if(type==='launch'){o.type='sine';o.frequency.setValueAtTime(180,now);o.frequency.exponentialRampToValueAtTime(420,now+0.15);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.16);o.start(now);o.stop(now+0.16);}
}
/* ── 인게임 변수 ── */
var cv,ctx,W=450,H=800,SCALE=1,OX=0,OY=0;
var WORLD_H,spd,T;
var WALL_W,PIN_R,BALL_R,GR,MAX_SPEED,ELASTIC_MAX;
var BO,MAX_PULL,LAUNCH_SPD;
var PIN_NORMAL,PIN_ELASTIC;
var CEILING_Y,CEILING_MULT;
var GAUGE_BOOST_FRAMES;
var TIERS,TIER_HEIGHT,HOLE_START_Y;

function buildHoles(){
  HDEFS=[];
  for(var ti=0;ti<10;ti++){
    var tier=TIERS[9-ti],zoneH=(WORLD_H-HOLE_START_Y)/10,yBase=HOLE_START_Y+ti*zoneH;
    var hcount=Math.min(2+(9-ti),ti<2?3:ti<4?4:ti<6?5:ti<8?6:7);
    for(var hi=0;hi<hcount;hi++){
      var frac=(hi+1)/(hcount+1),cy=yBase+Math.floor(zoneH*0.15+Math.random()*zoneH*0.65);
      HDEFS.push({mult:tier.mult,col:tier.col,r:28+ti*1.2,cx:Math.floor(W*(0.12+frac*0.76)),cy:cy,ax:25+Math.random()*25,ay:12+Math.random()*18,fx:.45+Math.random()*.5,fy:.35+Math.random()*.5,px:Math.random()*Math.PI*2,py:Math.random()*Math.PI*2});
    }
  }

}
function buildPins(){

    var wy=300+row*(WORLD_H-500)/ROWS,pcnt=row%2===0?3:2,sp=(W-WALL_W*2-80)/(pcnt+1);

      if(tc)continue;

}

function drawSuckBalls(){

    if(gg){gg.addColorStop(0,'rgba(255,255,255,.7)');gg.addColorStop(.4,s.isSplit?'rgba(255,100,180,.3)':s.elastic?'rgba(100,255,200,.3)':'rgba(180,200,255,.25)');gg.addColorStop(1,s.col+'66');ctx.fillStyle=gg;}else{ctx.fillStyle='rgba(180,200,255,.4)';}
    ctx.fill();ctx.strokeStyle=s.col;ctx.lineWidth=1.5;ctx.stroke();
    for(var j=0;j<4;j++){var ang=(T*3+j*1.57+ease*Math.PI*6)%(Math.PI*2),dist=r2*(1.2+j*.3)*(1-ease);ctx.beginPath();ctx.arc(bx2+Math.cos(ang)*dist,sy2+Math.sin(ang)*dist*.6,Math.max(2*(1-ease),.5),0,Math.PI*2);ctx.fillStyle='#FFD700';ctx.fill();}
    ctx.restore();
  }suckList=next;
}
function drawOriginBall(){
  if(ballList.length||balls<=0)return;
  var sx=BO.x,sy=ws(BO.y),c=getBallCoins();
  if(drag){
    var rdx=drag.cx-drag.sx,rdy=drag.cy-drag.sy,len=Math.sqrt(rdx*rdx+rdy*rdy)||1;
    var pull=Math.min(len,MAX_PULL),ratio=pull/MAX_PULL,ndx=rdx/len,ndy=rdy/len,bx2=sx+ndx*pull,by2=sy+ndy*pull;
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1.5;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(bx2,by2);ctx.stroke();ctx.setLineDash([]);
    var px=sx,py=sy,pvx=-ndx*LAUNCH_SPD*ratio,pvy=-ndy*LAUNCH_SPD*ratio;
    ctx.beginPath();ctx.moveTo(px,py);
    for(var i=0;i<26;i++){px+=pvx;py+=pvy;pvy+=GR;pvx*=.999;if(px<=WALL_W+BALL_R){px=WALL_W+BALL_R;pvx=Math.abs(pvx);}if(px>=W-WALL_W-BALL_R){px=W-WALL_W-BALL_R;pvx=-Math.abs(pvx);}ctx.lineTo(px,py);}
    ctx.strokeStyle='rgba(255,220,50,.3)';ctx.lineWidth=1.5;ctx.stroke();
    drawOneBall(bx2,camY+by2,BALL_R,false,false,c,0);
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(ratio>.12?'놓으면 발사!':'더 당기세요',bx2,by2-28);
  }else{
    drawOneBall(BO.x,BO.y,BALL_R,false,false,c,0);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText('여기를 드래그',sx,sy-28);
  }
}
function drawParticles(){var next=[];for(var i=0;i<parts.length;i++){var p=parts[i];p.life--;if(p.life<=0)continue;var sy=ws(p.wy);if(sy>-20&&sy<H+20){ctx.globalAlpha=p.life/p.max;ctx.beginPath();ctx.arc(p.x,sy,p.r*(p.life/p.max),0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();}p.x+=p.vx;p.wy+=p.vy;p.vy+=.18;next.push(p);}parts=next;ctx.globalAlpha=1;}
function drawFloats(){var next=[];for(var i=0;i<floats.length;i++){var f=floats[i];f.life--;if(f.life<=0)continue;var sy=ws(f.wy);if(sy>-20&&sy<H+20){ctx.globalAlpha=f.life/f.max;ctx.fillStyle=f.col;ctx.font='500 '+f.sz+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(f.txt,f.x,sy);}f.wy-=1.2;next.push(f);}floats=next;ctx.globalAlpha=1;}
function drawOver(){
  if(balls>0||ballList.length||suckList.length||parts.length)return;
  playLevelClear();
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFD700';ctx.font='500 24px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('게임 종료!',W/2,H/2-50);
  ctx.fillStyle='#fff';ctx.font='500 17px sans-serif';ctx.fillText('획득 코인: '+coins.toLocaleString(),W/2,H/2-14);
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='13px sans-serif';ctx.fillText('최고 기록: '+stats.best.toLocaleString(),W/2,H/2+18);
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='12px sans-serif';ctx.fillText('다시 시작 또는 로비로 돌아가세요',W/2,H/2+50);
}
function boomFx(x,wy,col){for(var i=0;i<28;i++){var a=Math.random()*Math.PI*2,sv=2+Math.random()*7;addPart(x,wy,Math.cos(a)*sv,Math.sin(a)*sv-2.5,3+Math.random()*5,Math.random()<.6?'#FFD700':col,55);}}
function pinFx(x,wy,col){playSound('pin');triggerShake(3.5);for(var i=0;i<14;i++){var a=-Math.PI*.9+Math.random()*Math.PI*.8,sv=2+Math.random()*5;addPart(x,wy,Math.cos(a)*sv,Math.sin(a)*sv,2+Math.random()*3,col,30);}}
function wallFx(x,wy){playSound('wall');triggerShake(5);for(var i=0;i<10;i++){var a=-Math.PI/2+(Math.random()-.5);addPart(x,wy,Math.cos(a)*(2+Math.random()*3),Math.sin(a)*(2+Math.random()*3),2+Math.random()*3,'rgba(100,220,255,1)',25);}}
function jackpotFx(x,wy){playSound('jackpot');for(var i=0;i<80;i++){var a=Math.random()*Math.PI*2,sv=3+Math.random()*12;addPart(x,wy,Math.cos(a)*sv,Math.sin(a)*sv-4,4+Math.random()*8,Math.random()<.4?'#FFD700':Math.random()<.5?'#FF9900':'#fff',80);}}
function checkPins(b){
  for(var i=0;i<pins.length;i++){
    var p=pins[i];var dx=b.x-p.x,dy=b.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist>=BALL_R+PIN_R+2)continue;
    var nx=dx/(dist||1),ny=dy/(dist||1);b.x=p.x+nx*(BALL_R+PIN_R+2);b.y=p.y+ny*(BALL_R+PIN_R+2);addBounce(b,1);p.flash=1;
    if(!p.hit){p.hit=true;if(p.type===PIN_ELASTIC){var spd2=Math.sqrt(b.vx*b.vx+b.vy*b.vy),boost=Math.min(ELASTIC_MAX,Math.max(14,spd2*1.4)),ang=-Math.PI/2+(Math.random()-.5)*(Math.PI*.3);b.vx=Math.cos(ang)*boost;b.vy=Math.sin(ang)*boost;b.elastic=true;b.turboTimer=90;clampSpd(b,ELASTIC_MAX);pinFx(p.x,p.y,'#44ffcc');addFloat('TURBO!',p.x,p.y-24,40,'#44ffcc',17);}else{var spd3=Math.sqrt(b.vx*b.vx+b.vy*b.vy),boost2=Math.min(MAX_SPEED,Math.max(11,spd3*1.2)),ang2=-Math.PI/2+(Math.random()-.5)*(Math.PI*.38);b.vx=Math.cos(ang2)*boost2;b.vy=Math.sin(ang2)*boost2;clampSpd(b,MAX_SPEED);pinFx(p.x,p.y,'#ffe060');addFloat('UP!',p.x,p.y-22,30,'#ffe060',15);}}
    else{var dot=b.vx*nx+b.vy*ny;b.vx-=2*dot*nx;b.vy-=2*dot*ny;clampSpd(b,b.elastic?ELASTIC_MAX:MAX_SPEED);}
  }
}
function checkWalls(b){
  var ms=b.elastic?ELASTIC_MAX:MAX_SPEED;
  if(b.x-BALL_R<=WALL_W){b.x=WALL_W+BALL_R;var speed=Math.max(Math.sqrt(b.vx*b.vx+b.vy*b.vy),10),a=-Math.PI/2+(Math.random()-.5)*(Math.PI*.4);b.vx=Math.cos(a)*speed;b.vy=Math.sin(a)*speed;addBounce(b,1);clampSpd(b,ms);wallFx(WALL_W+BALL_R,b.y);addFloat('UP!',WALL_W+55,b.y,25,'#64dcff',13);}
  if(b.x+BALL_R>=W-WALL_W){b.x=W-WALL_W-BALL_R;var speed2=Math.max(Math.sqrt(b.vx*b.vx+b.vy*b.vy),10),a2=-Math.PI/2+(Math.random()-.5)*(Math.PI*.4);b.vx=Math.cos(a2)*speed2;b.vy=Math.sin(a2)*speed2;addBounce(b,1);clampSpd(b,ms);wallFx(W-WALL_W-BALL_R,b.y);addFloat('UP!',W-WALL_W-55,b.y,25,'#64dcff',13);}
}
function checkCeiling(b){
  if(b.y>CEILING_Y+BALL_R)return false;
  var earned=(b.coins+b.bounces)*CEILING_MULT;coins+=earned;if(coins>stats.best)stats.best=coins;stats.jackpot++;
  jackpotFx(b.x,CEILING_Y);addFloat('JACKPOT!',b.x,CEILING_Y+40,100,'#FFD700',28);addFloat('+'+earned.toLocaleString(),b.x,CEILING_Y+76,90,'#FF9900',22);addFloat('x'+CEILING_MULT,b.x,CEILING_Y+108,80,'#fff',16);updHUD();return true;
}
function checkHoles(b){
  for(var i=0;i<holes.length;i++){var h=holes[i],dx=b.x-h.x,dy=b.y-h.y;if(Math.sqrt(dx*dx+dy*dy)<h.r*.85){suckList.push({startX:b.x,startY:b.y,hx:h.x,hy:h.y,hr:h.r,col:h.col,mult:h.mult,earned:(b.coins+b.bounces)*h.mult,bounces:b.bounces,isSplit:b.isSplit,elastic:b.elastic,t:0});return true;}}
  return false;
}
function loopGame(){
  animId=requestAnimationFrame(loopGame);
  if(!document.getElementById('scene-game').classList.contains('active'))return;
  T+=.022*spd;updHoles();updPins();updCamera();updGauge();updShake();
  ctx.save();ctx.setTransform(SCALE,0,0,SCALE,OX,OY);ctx.translate(shakeX,shakeY);
  drawBg();drawWalls();drawCeiling();drawTierBounds();drawPins();drawHoles();drawOriginBall();
  for(var pi=0;pi<pendingBalls.length;pi++)ballList.push(pendingBalls[pi]);pendingBalls=[];
  var nl=[];
  for(var bi=0;bi<ballList.length;bi++){
    var b=ballList[bi];if(b.turboTimer>0){b.turboTimer--;if(b.turboTimer===0)b.elastic=false;}
    b.x+=b.vx*spd;b.y+=b.vy*spd;b.vy+=GR*spd;b.vx*=.999;
    checkPins(b);checkWalls(b);if(checkCeiling(b))continue;
    if(!checkHoles(b)&&b.y<=WORLD_H+100&&b.y>=-300)nl.push(b);
  }
  ballList=nl;
  for(var pi2=0;pi2<pendingBalls.length;pi2++)ballList.push(pendingBalls[pi2]);pendingBalls=[];
  drawBalls();drawSuckBalls();drawParticles();drawFloats();drawGauge();drawOver();
  ctx.restore();
  updHUD();
}
function setupInput(){
  function getPos(e){var r=cv.getBoundingClientRect();var src=e.touches?e.touches[0]:e;var dpr=window.devicePixelRatio||1;var cx=(src.clientX-r.left)*(cv.width/r.width);var cy=(src.clientY-r.top)*(cv.height/r.height);return{x:(cx-OX)/SCALE,y:(cy-OY)/SCALE};}
  function tryDrag(e){if(ballList.length||balls<=0)return;var p=getPos(e),bsy=ws(BO.y);if(Math.sqrt((p.x-BO.x)*(p.x-BO.x)+(p.y-bsy)*(p.y-bsy))<70)drag={sx:p.x,sy:p.y,cx:p.x,cy:p.y};}
  function doFire(){if(!drag)return;var dx=drag.cx-drag.sx,dy=drag.cy-drag.sy,len=Math.sqrt(dx*dx+dy*dy)||1,ratio=Math.min(len/MAX_PULL,1);if(ratio>.08&&balls>0){var c=getBallCoins();coins-=c;balls--;ballList.push(mkBall(BO.x,BO.y,-dx/len*LAUNCH_SPD*ratio,-dy/len*LAUNCH_SPD*ratio,c,0,false));playSound('launch');resetPins();updHUD();}drag=null;}
  cv.addEventListener('mousedown',function(e){tryDrag(e);});
  cv.addEventListener('mousemove',function(e){if(drag){var p=getPos(e);drag.cx=p.x;drag.cy=p.y;}});
  cv.addEventListener('mouseup',function(){doFire();});
  cv.addEventListener('touchstart',function(e){e.preventDefault();tryDrag(e);},{passive:false});
  cv.addEventListener('touchmove',function(e){e.preventDefault();if(drag){var p=getPos(e);drag.cx=p.x;drag.cy=p.y;}},{passive:false});
  cv.addEventListener('touchend',function(e){e.preventDefault();doFire();},{passive:false});
}
</script>
